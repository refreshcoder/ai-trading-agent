name: Manual Tests

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running the test manually'
        required: false
        default: 'Routine check'
      provider:
        description: 'Market data provider (offline or akshare)'
        required: true
        default: 'offline'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 autopep8

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Project Simulation
        env:
          PYTHONPATH: .
          DATA_PROVIDER: ${{ inputs.provider }}
          SYMBOLS: 600519
          SPOT_POLL_INTERVAL_SEC: 1
          KLINE_REFRESH_INTERVAL_SEC: 1
          MAX_LOOPS: 1
          STRICT_TRADING_SESSIONS: "false"
        run: |
          python src/main.py
